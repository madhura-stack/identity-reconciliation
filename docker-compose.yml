version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: identity-db

    restart: always

    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: identity-backend

    restart: always

    depends_on:
      - postgres

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: identity_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres_data: