apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: identity-ingress
  namespace: identity-reconciliation

spec:
  rules:
    - host: identity.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: identity-service

                port:
                  number: 3000