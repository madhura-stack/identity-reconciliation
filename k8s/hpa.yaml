apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: identity-hpa
  namespace: identity-reconciliation

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-backend

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70